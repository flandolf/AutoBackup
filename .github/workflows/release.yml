name: Build and release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    name: Increment, build, and release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out the latest main branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Calculate the next patch version
        id: version
        shell: pwsh
        run: |
          git fetch --force --tags origin
          $latestTag = git tag --list 'v[0-9]*' --sort=-v:refname | Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($latestTag)) {
            $buildScript = Get-Content build.gradle -Raw
            $defaultMatch = [regex]::Match(
              $buildScript,
              "findProperty\('releaseVersion'\)\s*\?:\s*'(?<version>\d+\.\d+\.\d+)'"
            )
            if (-not $defaultMatch.Success) {
              throw 'Could not determine the initial version from build.gradle.'
            }
            $currentVersion = $defaultMatch.Groups['version'].Value
          } else {
            $currentVersion = $latestTag.TrimStart('v')
          }

          $versionMatch = [regex]::Match(
            $currentVersion,
            '^(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)$'
          )
          if (-not $versionMatch.Success) {
            throw "Latest version '$currentVersion' is not valid semantic versioning."
          }

          $nextVersion = '{0}.{1}.{2}' -f `
            $versionMatch.Groups['major'].Value, `
            $versionMatch.Groups['minor'].Value, `
            ([int]$versionMatch.Groups['patch'].Value + 1)
          "version=$nextVersion" >> $env:GITHUB_OUTPUT
          "tag=v$nextVersion" >> $env:GITHUB_OUTPUT
          "Releasing v$nextVersion"

      - name: Build the shaded plugin
        run: >-
          ./gradlew clean shadowJar
          -PreleaseVersion=${{ steps.version.outputs.version }}
          --warning-mode fail

      - name: Verify packaged version
        shell: pwsh
        run: |
          $jar = Get-ChildItem build/libs/*.jar
          if ($jar.Count -ne 1) {
            throw "Expected one release JAR, found $($jar.Count)."
          }

          New-Item -ItemType Directory -Path build/release-check | Out-Null
          Push-Location build/release-check
          & jar xf $jar.FullName plugin.yml
          $metadata = Get-Content plugin.yml -Raw
          Pop-Location

          $expected = "version: '${{ steps.version.outputs.version }}'"
          if (-not $metadata.Contains($expected)) {
            throw "Packaged plugin.yml does not contain $expected."
          }

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $jar = Get-ChildItem build/libs/*.jar | Select-Object -First 1
          $target = git rev-parse HEAD
          gh release create '${{ steps.version.outputs.tag }}' $jar.FullName `
            --target $target `
            --title 'AutoBackup ${{ steps.version.outputs.tag }}' `
            --generate-notes
